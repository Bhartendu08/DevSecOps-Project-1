services:
  db:
    image: postgres:16-alpine
    container_name: devsecops-db
    restart: unless-stopped
    environment:
       POSTGRES_USER: bhartendu
       POSTGRES_PASSWORD: root123456
       POSTGRES_DB: devsecops_db
    ports:
    - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
    - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devsecops-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      DB_USER: bhartendu
      DB_PASSWORD: root123456
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: devsecops_db
    expose:
    - "5000"

    depends_on:
      db:
        condition: service_healthy

    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp    

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devsecops-frontend
    restart: unless-stopped
    ports:
    - "80:8080"
    depends_on:
    - backend
    security_opt:
      - no-new-privileges:true
volumes:
  pgdata:
    driver: local

